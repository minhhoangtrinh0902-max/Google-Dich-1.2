<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Google Dịch Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f3f4;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #4285f4;
      margin-top: 20px;
    }

    .controls {
      margin: 20px;
    }

    select, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    button {
      background: #4285f4;
      color: white;
    }

    button:hover {
      background: #3367d6;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    textarea, .output {
      width: 350px;
      height: 150px;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    .output {
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h1>🌐 Google Dịch Pro</h1>

<div class="controls">
  <select id="from">
    <option value="en">Anh</option>
    <option value="vi">Việt</option>
  </select>

  <button onclick="swapLang()">🔄</button>

  <select id="to">
    <option value="vi">Việt</option>
    <option value="en">Anh</option>
  </select>
</div>

<div class="container">
  <textarea id="inputText" placeholder="Nhập văn bản..."></textarea>
  <div class="output" id="output"></div>
</div>

<div class="controls">
  <button onclick="speakInput()">🔊 Đọc gốc</button>
  <button onclick="speakOutput()">🔊 Đọc dịch</button>
</div>

<script>
let timeout;

// 🔹 Tự dịch khi gõ
document.getElementById("inputText").addEventListener("input", () => {
  clearTimeout(timeout);
  timeout = setTimeout(translateText, 500);
});

// 🔹 Hàm dịch
async function translateText() {
  let text = document.getElementById("inputText").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!text.trim()) {
    document.getElementById("output").innerText = "";
    return;
  }

  try {
    let res = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`
    );

    let data = await res.json();

    document.getElementById("output").innerText =
      data.responseData.translatedText;

  } catch {
    document.getElementById("output").innerText = "Lỗi dịch!";
  }
}

// 🔹 Đổi ngôn ngữ
function swapLang() {
  let from = document.getElementById("from");
  let to = document.getElementById("to");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;

  translateText();
}

// 🔹 Hàm đọc chung
function speak(text, lang) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = (lang === "vi") ? "vi-VN" : "en-US";
  speech.rate = 1;
  speech.pitch = 1;
  speechSynthesis.speak(speech);
}

// 🔹 Đọc gốc
function speakInput() {
  let text = document.getElementById("inputText").value;
  let lang = document.getElementById("from").value;
  speak(text, lang);
}

// 🔹 Đọc dịch
function speakOutput() {
  let text = document.getElementById("output").innerText;
  let lang = document.getElementById("to").value;
  speak(text, lang);
}
</script>

</body>
</html>
