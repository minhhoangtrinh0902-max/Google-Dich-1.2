<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Google Dịch Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- link CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌐 Google Dịch Pro</h1>

<div class="controls">
  <select id="from">
    <option value="en">Anh</option>
    <option value="vi">Việt</option>
  </select>

  <button onclick="swapLang()">🔄</button>

  <select id="to">
    <option value="vi">Việt</option>
    <option value="en">Anh</option>
  </select>
</div>

<div class="container">
  <textarea id="inputText" placeholder="Nhập văn bản..."></textarea>
  <div class="output" id="output"></div>
</div>

<div class="controls">
  <button onclick="speakInput()">🔊 Đọc gốc</button>
  <button onclick="speakOutput()">🔊 Đọc dịch</button>
</div>

<!-- link JS -->
<script src="script.js"></script>

</body>
</html>
